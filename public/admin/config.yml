# Decap CMS 配置文件
# 详细文档：https://decapcms.org/docs/configuration-options/

# ===== 后端配置 =====
backend:
  name: github
  repo: qingkong9579/Blog
  branch: master
  base_url: https://blog-cms-oauth.sfunction.top/
  auth_endpoint: auth

# 发布模式：simple = 直接提交，不使用 PR 流程
publish_mode: simple

# 本地开发时设为 true，可以用本地 Git 后端（不需要 GitHub OAuth）
local_backend: false

# 媒体文件（图片）存放位置
media_folder: "/images/posts"
public_folder: "/images/posts"

# ===== 内容集合配置 =====
collections:
  - name: "posts"
    label: "文章"
    label_singular: "文章"
    folder: "src/content/posts"
    nested:
      depth: 5
    create: true
    slug: "{{slug}}"

    # ===== 文章字段定义 =====
    fields:
      - { name: "title", label: "标题", widget: "string", required: true }
      - { name: "published", label: "发布日期", widget: "datetime", format: "yyyy-MM-dd", required: true }
      - { name: "updated", label: "更新日期", widget: "datetime", format: "yyyy-MM-dd", required: false }
      - { name: "draft", label: "草稿", widget: "boolean", default: false, required: true }
      - { name: "tags", label: "标签", widget: "list", required: true }
      - name: "category"
        label: "分类"
        widget: "select"
        options:
          - "随笔"
          - "记录"
        required: false
      - { name: "description", label: "摘要", widget: "string", required: true }
      - { name: "image", label: "封面图", widget: "string", required: false }
      - { name: "pinned", label: "置顶", widget: "boolean", default: false, required: false }
      - { name: "author", label: "作者", widget: "string", required: false }
      - { name: "comment", label: "开启评论", widget: "boolean", default: true, required: false }
      - { name: "password", label: "文章密码", widget: "string", required: false }
      - { name: "passwordHint", label: "密码提示", widget: "string", required: false }
      - { name: "body", label: "正文", widget: "markdown", required: true }
